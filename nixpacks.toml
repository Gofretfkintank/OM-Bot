# nixpacks.toml — Railway build config for OM-Bot
# Handles both Node.js (Discord bot) and Python (video analyzer)

[phases.setup]
nixPkgs = [
  # Python runtime
  "python311",
  "python311Packages.pip",

  # System libs required by OpenCV headless
  "libGL",
  "libGLU",
  "glib",

  # ffmpeg — needed by OpenCV to decode video (mp4, mov, mkv, webm, avi)
  "ffmpeg",

  # Node.js (LTS)
  "nodejs_20",
  "nodePackages.npm",
]

[phases.install]
cmds = [
  # Python deps first (torch CPU-only wheel needs extra index)
  "pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt --no-cache-dir",

  # Node deps
  "npm install",
]

[phases.build]
cmds = []   # nothing to compile

[start]
cmd = "node index.js"

[variables]
# Tell EasyOCR where to cache its model weights
# Railway persists /tmp between restarts in the same deployment
EASYOCR_MODULE_PATH = "/tmp/easyocr_models"

# Optional: point to system Python explicitly
PYTHON_PATH = "python3.11"
