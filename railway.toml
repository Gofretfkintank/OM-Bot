[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
# Node.js, Python, OpenCV için gerekli libGL kütüphaneleri ve fontlar tek satırda
nixPkgs = ["nodejs", "python311", "libGL", "libGLU", "fontconfig"]

[build.nixpacksPlan.phases.install]
# Hem botun hem de Python'ın kütüphanelerini sırayla kurar
cmds = [
  "npm install",
  "pip install -r requirements.txt"
]

[deploy]
# Sistem ayağa kalktığında botun ana dosyasını başlatır
startCommand = "node index.js"
restartPolicy = "on-failure"
